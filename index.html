<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Title, description, keywords, favicon and citation meta are injected at
       runtime by static/js/render.js from config.json. The values below are
       only fallbacks for first paint and no-JS clients. Edit config.json,
       NOT this file, to change page content. -->
  <meta name="description" content="Academic research project page." />
  <title>Research Project Page</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css?family=Google+Sans|Noto+Sans|Castoro" rel="stylesheet" />
  <link rel="stylesheet" href="./static/css/bulma.min.css" />
  <link rel="stylesheet" href="./static/css/fontawesome.all.min.css" />
  <link rel="stylesheet" href="./static/css/index.css" />
</head>

<body>
  <!-- The entire page is rendered into #app from config.json by render.js. -->
  <main id="app" data-config="config.json">
    <section class="section">
      <div class="container is-max-desktop has-text-centered app-loading">
        <p class="is-size-5">Loading…</p>
      </div>
    </section>
  </main>

  <noscript>
    <section class="section">
      <div class="container is-max-desktop notification">
        This project page is rendered from <code>config.json</code> and requires JavaScript to be enabled.
      </div>
    </section>
  </noscript>

  <script src="./static/js/render.js" defer></script>
</body>

</html>
